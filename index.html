<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>がんばれバヤシ！国試一直線</title>
    
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body style="background-color: #0b132b; color: #fff; font-family: 'Noto Sans JP', sans-serif;">
    <div id="app-container" style="max-width: 600px; margin: 0 auto; padding: 20px;">
        
        <header style="text-align: center; margin-bottom: 30px;">
            <h1 style="color: #fff; font-size: 1.5rem; text-shadow: 0 0 10px rgba(255,255,255,0.5);">
                がんばれバヤシ！<br>
                <span style="color: #00f3ff; text-shadow: 0 0 15px #00f3ff; font-size: 1.8rem;">国試一直線 - 限界突破編 -</span>
            </h1>
        </header>

        <div id="teacher-section" style="display: flex; align-items: flex-start; margin-bottom: 25px;">
            <div class="teacher-profile" style="text-align: center; margin-right: 15px;">
                <div style="border: 2px solid #00f3ff; border-radius: 50%; padding: 3px; box-shadow: 0 0 15px #00f3ff; width: 65px; height: 65px; background: #fff; overflow: hidden; display: flex; justify-content: center; align-items: center;">
                    <img src="kanio.png" alt="かにお教官" style="width: 100%; height: auto; border-radius: 50%;">
                </div>
                <p style="color: #00f3ff; font-size: 0.75rem; margin-top: 8px; font-weight: bold;">かにお教官</p>
            </div>
            
            <div id="teacher-message-box" style="flex: 1; border: 1px solid #00f3ff; border-radius: 8px; padding: 15px; box-shadow: 0 0 15px rgba(0,243,255,0.2); background: rgba(0,10,25,0.8); position: relative;">
                <p id="teacher-message" style="color: #fff; margin: 0; font-weight: bold; font-size: 0.95rem; line-height: 1.5;">
                    「通信エラーだ！スプレッドシートの公開設定を見直してくれ！」
                </p>
            </div>
        </div>

        <div id="start-screen">
            <style>
                .menu-btn { width: 100%; margin-bottom: 15px; padding: 15px; background: transparent; border: 2px solid #00f3ff; color: #00f3ff; font-weight: bold; font-size: 1.1rem; border-radius: 8px; box-shadow: 0 0 10px rgba(0,243,255,0.3); cursor: pointer; transition: 0.3s; }
            </style>
            <button class="menu-btn" onclick="startQuiz(10)">10問 特訓</button>
            <button class="menu-btn" onclick="startQuiz(50)">50問 特訓</button>
            <button class="menu-btn" onclick="startQuiz(120)">120問 本番モード</button>
            <button class="menu-btn" onclick="openStatsScreen()" style="border-color: #ff0055; color: #ff0055; box-shadow: 0 0 10px rgba(255,0,85,0.3);">過去の戦歴を見る</button>
        </div>

        <div id="quiz-contents" style="display: none; border: 1px solid #00f3ff; border-radius: 8px; padding: 20px; box-shadow: 0 0 15px rgba(0,243,255,0.2); background: rgba(0,10,25,0.8);">
            <h2 style="color: #00f3ff; font-family: 'Orbitron', sans-serif; font-size: 1.1rem; margin-top: 0; letter-spacing: 2px;">
                MISSION <span id="current-q-num">1</span> / <span id="total-q-num">0</span>
            </h2>
            
            <hr style="border: none; border-top: 1px dashed rgba(0, 243, 255, 0.4); margin: 15px 0;">
            
            <p id="question-text" style="color: #fff; font-size: 1.1rem; line-height: 1.6; font-weight: bold;">Loading...</p>
            
            <div id="options-area" style="margin-top: 20px;"></div>
            
            <div id="result-area" style="display: none; margin-top: 20px; border-top: 1px solid #00f3ff; padding-top: 15px;">
                <h3 style="color: #00f3ff;">教官の解説</h3>
                <p id="explanation" style="color: #fff; line-height: 1.5; font-size: 0.95rem;"></p>
            </div>
            
            <button id="next-btn" style="display: none; width: 100%; margin-top: 20px; padding: 15px; background: #00f3ff; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 1.1rem;">NEXT MISSION >></button>
        </div>

        <div id="final-screen" style="display: none;">
            <h2 style="color: #00f3ff; text-align: center;">特訓完了！</h2>
            <div id="final-score-display" style="text-align: center; font-size: 3rem; font-family: 'Orbitron'; font-weight: bold; margin: 20px 0;"></div>
            <div id="comparison-box" style="text-align: center; margin-bottom: 30px; font-weight: bold;"></div>
            
            <div style="position: relative; height: 250px; margin-bottom: 30px;"><canvas id="doughnutChart"></canvas></div>
            <div style="position: relative; height: 250px; margin-bottom: 30px;"><canvas id="historyChart"></canvas></div>
            
            <button class="menu-btn" onclick="location.reload()" style="width: 100%; border-color: #00f3ff; color: #00f3ff;">トップに戻る</button>
        </div>

        <div id="stats-screen" style="display: none;">
            <h2 style="color: #00f3ff; text-align: center;">バヤシの戦歴</h2>
            <div style="color: #fff; text-align: center; margin-bottom: 20px; padding: 10px; background: rgba(0,243,255,0.1); border-radius: 5px;">
                <p style="margin: 5px 0;">週間: <span id="weekly-count">0</span>問 / 正答率: <span id="weekly-rate">0</span>%</p>
                <p style="margin: 5px 0;">月間: <span id="monthly-count">0</span>問 / 正答率: <span id="monthly-rate">0</span>%</p>
            </div>
            <div id="log-list" style="color: #fff; max-height: 300px; overflow-y: auto;"></div>
            <button class="menu-btn" onclick="closeStatsScreen()" style="width: 100%; margin-top: 20px;">戻る</button>
        </div>

    </div>

    <script src="main.js?v=999"></script>
</body>
</html>
