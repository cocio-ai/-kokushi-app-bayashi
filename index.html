<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>がんばれバヤシ！国試一直線</title>
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="teacher-area">
            <div class="teacher-icon">🦀</div>
            <div class="balloon">
                <p id="teacher-message">「データを読み込んでいるぞ！熱く待て！」</p>
            </div>
        </div>

        <div class="quiz-card" id="quiz-contents">
            <div class="q-progress">第 <span id="current-q-num">-</span> 問 / 全 <span id="total-q-num">-</span> 問</div>
            <h2 class="question-text" id="question-text">読み込み中...</h2>
            
            <div class="options-container" id="options-area">
                </div>

            <div class="result-container" id="result-area" style="display: none;">
                <div class="explanation-box">
                    <h3>【かにを先生の熱血解説】</h3>
                    <p id="explanation"></p>
                </div>
                <button class="next-btn" id="next-btn">次の問題へ！</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
