<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>がんばれバヤシ！国試一直線</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div id="app-container">
        <header>
            <h1>がんばれバヤシ！<br><span>国試一直線 - 限界突破編 -</span></h1>
        </header>

        <div id="teacher-section">
            <div class="teacher-profile">
                <img src="kaniwo.png" alt="かにお教官">
                <p>かにお教官</p>
            </div>
            <div id="teacher-message-box">
                <p id="teacher-message">「よし！今日も限界を突破するぞ！」</p>
            </div>
        </div>

        <div id="start-screen">
            <button class="menu-btn" onclick="startQuiz(10)">10問 特訓</button>
            <button class="menu-btn" onclick="startQuiz(50)">50問 特訓</button>
            <button class="menu-btn" onclick="startQuiz(120)">120問 本番モード</button>
            <button class="menu-btn stats-btn" onclick="openStatsScreen()">過去の戦歴を見る</button>
        </div>

        <div id="quiz-contents" style="display: none;">
            <h2 class="mission-title">MISSION <span id="current-q-num">1</span> / <span id="total-q-num">0</span></h2>
            <hr class="cyber-line">
            <p id="question-text">Loading...</p>
            
            <div id="options-area"></div>
            
            <div id="result-area" style="display: none;">
                <h3>教官の解説</h3>
                <p id="explanation"></p>
            </div>
            
            <button id="next-btn" style="display: none;">NEXT MISSION >></button>
        </div>

        <div id="final-screen" style="display: none;">
            <h2>特訓完了！</h2>
            <div id="final-score-display"></div>
            <div id="comparison-box"></div>
            <div class="chart-container"><canvas id="doughnutChart"></canvas></div>
            <div class="chart-container"><canvas id="historyChart"></canvas></div>
            <button class="menu-btn" onclick="location.reload()">トップに戻る</button>
        </div>

        <div id="stats-screen" style="display: none;">
            <h2>バヤシの戦歴</h2>
            <div class="stats-summary">
                <p>週間: <span id="weekly-count">0</span>問 / 正答率: <span id="weekly-rate">0</span>%</p>
                <p>月間: <span id="monthly-count">0</span>問 / 正答率: <span id="monthly-rate">0</span>%</p>
            </div>
            <div id="log-list"></div>
            <button class="menu-btn" onclick="closeStatsScreen()">戻る</button>
        </div>
    </div>

    <script src="main.js?v=cyberMAX"></script>
</body>
</html>
