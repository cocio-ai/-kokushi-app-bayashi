<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>国試バヤシ 特訓システム</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
</head>
<body>
    <div id="app-container">
        
        <div id="teacher-message-box">
            <p id="teacher-message">「よし！今日も限界を突破するぞ！特訓メニューを選べ！」</p>
        </div>

        <div id="start-screen">
            <button class="menu-btn" onclick="startQuiz(10)">10問 特訓</button>
            <button class="menu-btn" onclick="startQuiz(50)">50問 特訓</button>
            <button class="menu-btn" onclick="startQuiz(120)">120問 本番モード</button>
            <button class="menu-btn stats-btn" onclick="openStatsScreen()">過去の戦歴を見る</button>
        </div>

        <div id="quiz-contents" style="display: none;">
            <h2 class="mission-title">MISSION <span id="current-q-num">0</span> / <span id="total-q-num">0</span></h2>
            <p id="question-text">問題データへアクセス中...</p>
            
            <div id="options-area"></div>
            
            <div id="result-area" style="display: none;">
                <h3>教官の解説</h3>
                <p id="explanation"></p>
            </div>
            
            <button id="next-btn" style="display: none;">NEXT MISSION >></button>
        </div>

        <div id="final-screen" style="display: none;">
            <h2>特訓完了！</h2>
            <div id="final-score-display"></div>
            <div id="comparison-box"></div>
            
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
            </div>
