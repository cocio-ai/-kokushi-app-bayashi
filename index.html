<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>がんばれバヤシ！国試一直線</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body>
    <div class="app-container">
        
        <header class="app-header">
            <h1 class="main-title">がんばれバヤシ！<br><span class="title-sub">国試一直線 - 限界突破編 -</span></h1>
        </header>

        <div class="teacher-area">
            <div class="teacher-profile">
                <img src="kaniwo.png" alt="かにお教官" class="teacher-icon">
                <div class="teacher-name">かにお教官</div>
            </div>
            <div class="balloon">
                <p id="teacher-message">「システム起動完了だ！今日も限界を突破するぞ、気合を入れろ！」</p>
            </div>
        </div>

        <div class="start-screen" id="start-screen">
            <div class="app-description">
                <p>過去のデータからランダムに出題される特訓システムだ。<br>
                スキマ時間を制する者が国試を制す！</p>
            </div>
            <h2 class="cyber-title">▶ SELECT MISSION LEVEL</h2>
            <button class="mode-btn" onclick="startQuiz(10)"><div class="mode-title">QUICK HACK (10問)</div></button>
            <button class="mode-btn" onclick="startQuiz(20)"><div class="mode-title">NEURAL DRIVE (20問)</div></button>
            <button class="mode-btn" onclick="startQuiz(30)"><div class="mode-title">SYSTEM MASTER (30問)</div></button>
        </div>

        <div class="quiz-card" id="quiz-contents" style="display: none;">
            <div class="q-progress">MISSION <span id="current-q-num">-</span> / <span id="total-q-num">-</span></div>
            <h2 class="question-text" id="question-text">Loading...</h2>
            <div class="options-container" id="options-area"></div>
            
            <div class="result-container" id="result-area" style="display: none;">
                <div class="explanation-box">
                    <h3 class="exp-title">[ SYSTEM ANALYSIS : 教官の解説 ]</h3>
                    <p id="explanation"></p>
                </div>
                <button class="next-btn" id="next-btn">NEXT MISSION &gt;&gt;</button>
            </div>
        </div>

    </div>
    <script src="main.js"></script>
</body>
</html>
