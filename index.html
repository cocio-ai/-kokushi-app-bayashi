<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>がんばれバヤシ！国試一直線</title>
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="app-container">
        <div class="teacher-area">
            <div class="teacher-icon">🤖</div>
            <div class="balloon">
                <p id="teacher-message">「システム起動... ミッションレベルを選択しろ！」</p>
            </div>
        </div>

        <div class="start-screen" id="start-screen">
            <h2 class="cyber-title">SELECT MISSION LEVEL</h2>
            
            <button class="mode-btn" onclick="startQuiz(10)">
                <div class="mode-title">QUICK HACK (10問)</div>
                <div class="mode-time">EST. TIME: 約3分 / スキマ時間の電撃戦</div>
            </button>

            <button class="mode-btn" onclick="startQuiz(20)">
                <div class="mode-title">NEURAL DRIVE (20問)</div>
                <div class="mode-time">EST. TIME: 約7分 / 集中力を持続せよ</div>
            </button>

            <button class="mode-btn" onclick="startQuiz(30)">
                <div class="mode-title">SYSTEM MASTER (30問)</div>
                <div class="mode-time">EST. TIME: 約12分 / 限界突破のフル特訓</div>
            </button>

            <button class="archive-btn" onclick="openStatsScreen()">
                [ ARCHIVE ] 統計・ログデータを確認する
            </button>
        </div>

        <div class="quiz-card" id="quiz-contents" style="display: none;">
            <div class="q-progress">MISSION <span id="current-q-num">-</span> / <span id="total-q-num">-</span></div>
            <h2 class="question-text" id="question-text">Loading...</h2>
            
            <div class="options-container" id="options-area"></div>

            <div class="result-container" id="result-area" style="display: none;">
                <div class="explanation-box">
                    <h3>[ SYSTEM ANALYSIS ]</h3>
                    <p id="explanation"></p>
                </div>
                <button class="next-btn" id="next-btn">NEXT MISSION &gt;&gt;</button>
            </div>
        </div>

        <div class="quiz-card" id="stats-screen" style="display: none;">
            <h2 class="cyber-title" style="text-align: center;">DATA CENTER</h2>
            
            <div class="stats-summary-container">
                <div class="stats-summary-card weekly">
                    <h4>WEEKLY (7日間)</h4>
                    <div class="stats-val" id="weekly-count">0<span>問</span></div>
                    <div class="stats-label">挑戦問題数</div>
                    <div class="stats-val" id="weekly-rate">0<span>%</span></div>
                    <div class="stats-label">平均正答率</div>
                </div>
                <div class="stats-summary-card monthly">
                    <h4>MONTHLY (30日間)</h4>
                    <div class="stats-val" id="monthly-count">0<span>問</span></div>
                    <div class="stats-label">挑戦問題数</div>
                    <div class="stats-val" id="monthly-rate">0<span>%</span></div>
                    <div class="stats-label">平均正答率</div>
                </div>
            </div>

            <h3 style="color: #00f3ff; font-family: 'Orbitron'; font-size: 14px; margin-top: 25px; border-bottom: 1px solid rgba(0,243,255,0.3); padding-bottom: 5px;">LOG HISTORY</h3>
            <div class="log-list" id="log-list">
                <p style="color: #64748b; text-align: center; font-size: 13px;">ログデータを展開中...</p>
            </div>

            <button class="next-btn" style="margin-top: 20px;" onclick="closeStatsScreen()">&lt;&lt; BACK TO MENU</button>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
